name: Update Macro Engine

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas feedparser

      - name: Run macro engine
        run: python macro_engine_v2.py

      - name: Commit updates
        run: |
          git config user.name "macro-bot"
          git config user.email "macro-bot@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "update macro feed"
          git pull --rebase origin main
          git push origin main
